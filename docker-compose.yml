services:
  # ==========================================================================
  # MySQL 8.0 - 业务数据库
  # ==========================================================================
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rag_db}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rag_network

  # ==========================================================================
  # PostgreSQL 16 - LangGraph 状态持久化
  # ==========================================================================
  postgres:
    image: postgres:16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-rag_checkpoint}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DATABASE:-rag_checkpoint}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag_network

  # ==========================================================================
  # etcd - Milvus 元数据存储
  # ==========================================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag_network

  # ==========================================================================
  # MinIO - Milvus 对象存储
  # ==========================================================================
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: rag-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag_network

  # ==========================================================================
  # Milvus 2.6 - 向量数据库
  # ==========================================================================
  milvus:
    image: milvusdb/milvus:v2.6.0
    container_name: rag-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - rag_network

  # ==========================================================================
  # Redis 7 - 缓存
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  # ==========================================================================
  # Neo4j 5 - 图数据库 (LightRAG 知识图谱)
  # ==========================================================================
  neo4j:
    image: neo4j:5
    container_name: rag-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4jpassword}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1' | cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-neo4jpassword} 2>/dev/null || curl -f http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag_network

  # ==========================================================================
  # FastAPI 应用 - RAG Backend
  # ==========================================================================
  app:
    build:
      context: ./rag-backend
      dockerfile: Dockerfile
    container_name: rag-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rag_network

# ============================================================================
# Named Volumes (数据持久化)
# ============================================================================
volumes:
  mysql_data:
    name: rag_mysql_data
  postgres_data:
    name: rag_postgres_data
  etcd_data:
    name: rag_etcd_data
  minio_data:
    name: rag_minio_data
  milvus_data:
    name: rag_milvus_data
  neo4j_data:
    name: rag_neo4j_data

# ============================================================================
# 共享网络
# ============================================================================
networks:
  rag_network:
    driver: bridge
    name: rag_network
